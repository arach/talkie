<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 636.88 229" width="636.88" height="229">
  <defs>
    <filter id="phosphor-bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="1" height="6" patternUnits="userSpaceOnUse">
      <rect width="1" height="3" fill="black" opacity="0.2"/>
    </pattern>
  </defs>

  <rect x="-20" y="-20" width="636.88" height="229" fill="#0E0D0A"/>

  <g filter="url(#phosphor-bloom)">
    <text
      x="0 108 216 319.68 427.68 488.88"
      y="147.6"
      font-family="'JetBrains Mono', ui-monospace, monospace"
      font-size="180"
      font-weight="500"
      fill="#E8B547"
    >talkie</text>
    <circle cx="435.78" cy="25.467" r="16.524" fill="#E8B547"/>
  </g>

  <rect x="-20" y="-20" width="636.88" height="229" fill="url(#scanlines)"/>
</svg>
