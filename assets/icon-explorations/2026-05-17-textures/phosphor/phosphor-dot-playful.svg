<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="phosphor-bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="18" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="1" height="6" patternUnits="userSpaceOnUse">
      <rect width="1" height="3" fill="black" opacity="0.2"/>
    </pattern>
  </defs>

  <rect width="128" height="128" fill="#0E0D0A"/>

  <circle cx="64" cy="64" r="22" fill="#E8B547" filter="url(#phosphor-bloom)"/>

  <rect width="128" height="128" fill="url(#scanlines)"/>
</svg>
