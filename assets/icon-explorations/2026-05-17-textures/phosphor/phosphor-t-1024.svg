<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="phosphor-bloom" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="20" result="blur2"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" result="blur3"/>
      <feMerge>
        <feMergeNode in="blur3"/>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="1" height="6" patternUnits="userSpaceOnUse">
      <rect width="1" height="3" fill="black" opacity="0.2"/>
    </pattern>
  </defs>

  <rect width="1024" height="1024" fill="#0E0D0A"/>

  <g transform="translate(194.56, 0)" filter="url(#phosphor-bloom)">
    <text
      x="317.44"
      y="880.64"
      font-family="'JetBrains Mono', ui-monospace, monospace"
      font-size="798.72"
      font-weight="500"
      fill="#E8B547"
      text-anchor="middle"
    >t</text>
  </g>

  <rect width="1024" height="1024" fill="url(#scanlines)"/>
</svg>
