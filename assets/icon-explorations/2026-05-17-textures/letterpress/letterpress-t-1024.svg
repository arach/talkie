<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <filter id="letterpress" x="-10%" y="-10%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <!-- 1. Paper grain -->
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="42" result="grain"/>

      <!-- 2. Ink bleed -->
      <feMorphology in="SourceGraphic" operator="dilate" radius="1.2" result="bleed"/>

      <!-- 3. Directional shadow offset -->
      <feOffset in="bleed" dx="3" dy="5" result="shifted"/>

      <!-- 4. Soft shadow blur -->
      <feGaussianBlur in="shifted" stdDeviation="3" result="blurred"/>

      <!-- 5. Colored shadow -->
      <feFlood flood-color="#0E0D0A" flood-opacity="0.15" result="shadowColor"/>
      <feComposite in="shadowColor" in2="blurred" operator="in" result="shadow"/>

      <!-- 6. Merge shadow + bleed -->
      <feMerge result="merged">
        <feMergeNode in="shadow"/>
        <feMergeNode in="bleed"/>
      </feMerge>

      <!-- 7. Multiply blend with grain -->
      <feBlend in="merged" in2="grain" mode="multiply" result="final"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="#F4EFE6"/>

  <!-- Letterpress T glyph -->
  <g transform="translate(194.56, 0)">
    <text
      x="317.44"
      y="880.64"
      font-family="'JetBrains Mono', ui-monospace, monospace"
      font-size="798.72"
      font-weight="500"
      text-anchor="middle"
      fill="#0E0D0A"
      filter="url(#letterpress)"
    >T</text>
  </g>
</svg>
