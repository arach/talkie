<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <filter id="letterpress-restrained" x="-20%" y="-20%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <!-- 1. Paper grain -->
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="42" result="grain"/>

      <!-- 2. Ink bleed (lighter) -->
      <feMorphology in="SourceGraphic" operator="dilate" radius="0.5" result="bleed"/>

      <!-- 3. Directional shadow offset (subtle) -->
      <feOffset in="bleed" dx="0.5" dy="1" result="shifted"/>

      <!-- 4. Soft shadow blur -->
      <feGaussianBlur in="shifted" stdDeviation="0.8" result="blurred"/>

      <!-- 5. Colored shadow -->
      <feFlood flood-color="#0E0D0A" flood-opacity="0.10" result="shadowColor"/>
      <feComposite in="shadowColor" in2="blurred" operator="in" result="shadow"/>

      <!-- 6. Merge shadow + bleed -->
      <feMerge result="merged">
        <feMergeNode in="shadow"/>
        <feMergeNode in="bleed"/>
      </feMerge>

      <!-- 7. Multiply blend with grain -->
      <feBlend in="merged" in2="grain" mode="multiply" result="final"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="128" height="128" fill="#F4EFE6"/>

  <!-- Restrained dot -->
  <circle
    cx="64"
    cy="64"
    r="10"
    fill="#0E0D0A"
    filter="url(#letterpress-restrained)"
  />
</svg>
