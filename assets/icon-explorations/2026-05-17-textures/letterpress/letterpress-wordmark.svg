<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 636.88 229" width="636.88" height="229">
  <defs>
    <filter id="letterpress-wm" x="-10%" y="-10%" width="130%" height="130%" color-interpolation-filters="sRGB">
      <!-- 1. Paper grain -->
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="42" result="grain"/>

      <!-- 2. Ink bleed -->
      <feMorphology in="SourceGraphic" operator="dilate" radius="0.3" result="bleed"/>

      <!-- 3. Directional shadow offset -->
      <feOffset in="bleed" dx="0.8" dy="1.2" result="shifted"/>

      <!-- 4. Soft shadow blur -->
      <feGaussianBlur in="shifted" stdDeviation="0.8" result="blurred"/>

      <!-- 5. Colored shadow -->
      <feFlood flood-color="#0E0D0A" flood-opacity="0.12" result="shadowColor"/>
      <feComposite in="shadowColor" in2="blurred" operator="in" result="shadow"/>

      <!-- 6. Merge shadow + bleed -->
      <feMerge result="merged">
        <feMergeNode in="shadow"/>
        <feMergeNode in="bleed"/>
      </feMerge>

      <!-- 7. Multiply blend with grain -->
      <feBlend in="merged" in2="grain" mode="multiply" result="final"/>
    </filter>

    <filter id="letterpress-dot" x="-20%" y="-20%" width="150%" height="150%" color-interpolation-filters="sRGB">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" seed="42" result="grain"/>
      <feMorphology in="SourceGraphic" operator="dilate" radius="0.3" result="bleed"/>
      <feOffset in="bleed" dx="0.8" dy="1.2" result="shifted"/>
      <feGaussianBlur in="shifted" stdDeviation="0.8" result="blurred"/>
      <feFlood flood-color="#FF5346" flood-opacity="0.12" result="shadowColor"/>
      <feComposite in="shadowColor" in2="blurred" operator="in" result="shadow"/>
      <feMerge result="merged">
        <feMergeNode in="shadow"/>
        <feMergeNode in="bleed"/>
      </feMerge>
      <feBlend in="merged" in2="grain" mode="multiply" result="final"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="-20" y="-20" width="636.88" height="229" fill="#F4EFE6"/>

  <!-- Wordmark: talkie -->
  <text
    x="0 108 216 319.68 427.68 488.88"
    y="147.6"
    font-family="'JetBrains Mono', ui-monospace, monospace"
    font-size="180"
    font-weight="500"
    fill="#0E0D0A"
    filter="url(#letterpress-wm)"
  >talkie</text>

  <!-- i-dot in Hot Mic -->
  <circle
    cx="435.78"
    cy="25.47"
    r="16.52"
    fill="#FF5346"
    filter="url(#letterpress-dot)"
  />
</svg>
