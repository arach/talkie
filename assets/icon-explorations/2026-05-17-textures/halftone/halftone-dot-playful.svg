  <circle cx="46" cy="46" r="2.5" fill="#7A6E5C" opacity="0.6"/>
  <circle cx="55" cy="46" r="3.2" fill="#FF5346" opacity="0.5"/>
  <circle cx="64" cy="46" r="3.8" fill="#7A6E5C" opacity="0.7"/>
  <circle cx="73" cy="46" r="3.0" fill="#FF5346" opacity="0.5"/>
  <circle cx="82" cy="46" r="2.2" fill="#7A6E5C" opacity="0.6"/>

  <!-- Row 1 -->
  <circle cx="46" cy="55" r="3.0" fill="#FF5346" opacity="0.6"/>
  <circle cx="55" cy="55" r="4.5" fill="#7A6E5C" opacity="0.8"/>
  <circle cx="64" cy="55" r="5.5" fill="#FF5346" opacity="0.7"/>
  <circle cx="73" cy="55" r="4.2" fill="#7A6E5C" opacity="0.8"/>
  <circle cx="82" cy="55" r="2.8" fill="#FF5346" opacity="0.5"/>

  <!-- Row 2 (center) -->
  <circle cx="46" cy="64" r="3.5" fill="#7A6E5C" opacity="0.7"/>
  <circle cx="55" cy="64" r="5.5" fill="#FF5346" opacity="0.8"/>
  <circle cx="64" cy="64" r="7.0" fill="#7A6E5C" opacity="0.9"/>
  <circle cx="66" cy="66" r="6.5" fill="#FF5346" opacity="0.6"/>
  <circle cx="73" cy="64" r="5.2" fill="#7A6E5C" opacity="0.8"/>
  <circle cx="82" cy="64" r="3.2" fill="#FF5346" opacity="0.6"/>

  <!-- Row 3 -->
  <circle cx="46" cy="73" r="2.8" fill="#FF5346" opacity="0.5"/>
  <circle cx="55" cy="73" r="4.2" fill="#7A6E5C" opacity="0.7"/>
  <circle cx="64" cy="73" r="5.2" fill="#FF5346" opacity="0.7"/>
  <circle cx="73" cy="73" r="4.0" fill="#7A6E5C" opacity="0.7"/>
  <circle cx="82" cy="73" r="2.5" fill="#FF5346" opacity="0.5"/>

  <!-- Row 4 -->
  <circle cx="46" cy="82" r="2.0" fill="#7A6E5C" opacity="0.5"/>
  <circle cx="55" cy="82" r="3.0" fill="#FF5346" opacity="0.5"/>
  <circle cx="64" cy="82" r="3.5" fill="#7A6E5C" opacity="0.6"/>
  <circle cx="73" cy="82" r="2.8" fill="#FF5346" opacity="0.5"/>
  <circle cx="82" cy="82" r="2.0" fill="#7A6E5C" opacity="0.5"/>
</svg>
