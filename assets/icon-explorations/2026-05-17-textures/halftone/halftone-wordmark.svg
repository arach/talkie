      <tspan x="0" dy="0">t</tspan><tspan x="108" dy="0">a</tspan><tspan x="216" dy="0">l</tspan><tspan x="319.68" dy="0">k</tspan><tspan x="427.68" dy="0">i</tspan><tspan x="488.88" dy="0">e</tspan>
