<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <clipPath id="dotclip">
      <circle cx="64" cy="64" r="10"/>
    </clipPath>
    <pattern id="dothatch1" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(30)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#7A6E5C" stroke-width="0.4"/>
    </pattern>
    <pattern id="dothatch2" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(-30)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#7A6E5C" stroke-width="0.35"/>
    </pattern>
    <pattern id="dothatch3" width="12" height="12" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <line x1="0" y1="0" x2="0" y2="12" stroke="#7A6E5C" stroke-width="0.2"/>
    </pattern>
  </defs>
  <rect width="128" height="128" fill="#0E0D0A"/>
  <g clip-path="url(#dotclip)">
    <rect width="128" height="128" fill="url(#dothatch1)"/>
    <rect width="128" height="128" fill="url(#dothatch2)" opacity="0.7"/>
    <rect width="128" height="128" fill="url(#dothatch3)" opacity="0.4"/>
  </g>
  <circle cx="64" cy="64" r="10" fill="none" stroke="#7A6E5C" stroke-width="0.6" opacity="0.5"/>
</svg>
