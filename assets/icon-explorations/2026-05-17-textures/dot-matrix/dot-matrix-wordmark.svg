<svg xmlns="http://www.w3.org/2000/svg" viewBox="-20 -20 636.88 229" width="636.88" height="229">
  <defs>
    <pattern id="litgrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="3.2" fill="white"/>
    </pattern>
    <pattern id="unlitgrid" width="10" height="10" patternUnits="userSpaceOnUse">
      <circle cx="5" cy="5" r="3" fill="#3A372F" opacity="0.3"/>
    </pattern>
    <mask id="dotmask">
      <rect x="-20" y="-20" width="636.88" height="229" fill="url(#litgrid)"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect x="-20" y="-20" width="636.88" height="229" fill="#0E0D0A"/>

  <!-- Unlit dot grid -->
  <rect x="-20" y="-20" width="636.88" height="229" fill="url(#unlitgrid)"/>

  <!-- Wordmark through dot mask -->
  <g mask="url(#dotmask)">
    <text
      x="0 108 216 319.68 427.68 488.88"
      y="147.6"
      font-family="'JetBrains Mono', ui-monospace, monospace"
      font-size="180"
      font-weight="500"
      fill="#E8B547"
    >talkie</text>

    <!-- i-dot -->
    <circle cx="435.78" cy="25.47" r="16.52" fill="#E8B547"/>
  </g>
</svg>
