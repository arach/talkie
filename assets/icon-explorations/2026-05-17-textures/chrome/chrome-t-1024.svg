      <stop offset="0%"   stop-color="#D4C4A0"/>
      <stop offset="18%"  stop-color="#8A7650"/>
      <stop offset="35%"  stop-color="#C9B580"/>
      <stop offset="50%"  stop-color="#F0E4C8"/>
      <stop offset="65%"  stop-color="#9A8660"/>
      <stop offset="82%"  stop-color="#705830"/>
      <stop offset="100%" stop-color="#C0A870"/>
    </linearGradient>
    <filter id="specular">
