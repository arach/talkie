<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <clipPath id="ios-clip">
      <rect width="1024" height="1024"/>
    </clipPath>
  </defs>

  <!-- Background: Canvas -->
  <rect width="1024" height="1024" fill="#0E0D0A"/>

  <!-- Landmark T mark — Cream -->
  <g fill="#F4EFE6">
    <!-- Crossbar: forward-leaning (right end 18px higher) -->
    <polygon points="168,318 856,300 856,365 168,383"/>
    <!-- Stem -->
    <rect x="462" y="365" width="100" height="390" rx="3"/>
    <!-- Hook: bottom-left curve -->
    <path d="M 462 720 L 462 765 Q 462 800 435 812 Q 410 822 405 800 Q 400 778 425 772 L 462 765" fill="#F4EFE6"/>
  </g>

  <!-- Hot Mic dot — accent at upper-right of crossbar -->
  <circle cx="790" cy="248" r="42" fill="#E68A3C"/>
</svg>
