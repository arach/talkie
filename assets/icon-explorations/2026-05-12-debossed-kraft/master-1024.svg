<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Paper texture noise (simulated) -->
    <filter id="paper-grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="gray-noise"/>
      <feBlend in="SourceGraphic" in2="gray-noise" mode="multiply" result="textured"/>
    </filter>
    <!-- Deboss shadow -->
    <filter id="deboss" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="4" result="blur"/>
      <feOffset dx="3" dy="5" result="offset-shadow"/>
      <feFlood flood-color="#0E0D0A" flood-opacity="0.5" result="shadow-color"/>
      <feComposite in="shadow-color" in2="offset-shadow" operator="in" result="dark-shadow"/>
      <!-- Light edge (top-left highlight) -->
      <feOffset in="SourceAlpha" dx="-2" dy="-3" result="offset-light"/>
      <feGaussianBlur in="offset-light" stdDeviation="2" result="blur-light"/>
      <feFlood flood-color="#F4EFE6" flood-opacity="0.4" result="light-color"/>
      <feComposite in="light-color" in2="blur-light" operator="in" result="highlight"/>
      <!-- Composite -->
      <feMerge>
        <feMergeNode in="dark-shadow"/>
        <feMergeNode in="highlight"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background: warm kraft paper -->
  <rect width="1024" height="1024" fill="#C4B49A" filter="url(#paper-grain)"/>

  <!-- Debossed T mark -->
  <g fill="#A89880" filter="url(#deboss)">
    <!-- Crossbar: forward-leaning -->
    <polygon points="168,318 856,300 856,365 168,383"/>
    <!-- Stem -->
    <rect x="462" y="365" width="100" height="390" rx="3"/>
    <!-- Hook -->
    <path d="M 462 720 L 462 765 Q 462 800 435 812 Q 410 822 405 800 Q 400 778 425 772 L 462 765"/>
  </g>

  <!-- Hot Mic dot — pressed into paper, slightly raised -->
  <circle cx="790" cy="248" r="40" fill="#E68A3C" filter="url(#deboss)"/>
</svg>
