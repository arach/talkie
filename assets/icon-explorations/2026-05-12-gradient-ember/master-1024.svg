<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Hot Mic orange → deep cassette amber -->
    <linearGradient id="ember" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E68A3C"/>
      <stop offset="100%" stop-color="#8B5A2B"/>
    </linearGradient>
  </defs>

  <!-- Background: Canvas -->
  <rect width="1024" height="1024" fill="#0E0D0A"/>

  <!-- Landmark T mark — Ember gradient -->
  <g fill="url(#ember)">
    <!-- Crossbar: forward-leaning -->
    <polygon points="168,318 856,300 856,365 168,383"/>
    <!-- Stem -->
    <rect x="462" y="365" width="100" height="390" rx="3"/>
    <!-- Hook -->
    <path d="M 462 720 L 462 765 Q 462 800 435 812 Q 410 822 405 800 Q 400 778 425 772 L 462 765"/>
  </g>

  <!-- Subtle glow behind the T top -->
  <ellipse cx="512" cy="340" rx="300" ry="80" fill="#E68A3C" opacity="0.06"/>
</svg>
