<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <mask id="t-cutout">
      <!-- White = visible, black = cut out -->
      <rect width="1024" height="1024" fill="white"/>
      <!-- Cut the T shape out -->
      <polygon points="168,318 856,300 856,365 168,383" fill="black"/>
      <rect x="462" y="365" width="100" height="390" rx="3" fill="black"/>
      <path d="M 462 720 L 462 765 Q 462 800 435 812 Q 410 822 405 800 Q 400 778 425 772 L 462 765" fill="black"/>
    </mask>
  </defs>

  <!-- Background: Canvas -->
  <rect width="1024" height="1024" fill="#0E0D0A"/>

  <!-- Cream rounded rectangle with T cut out -->
  <rect x="112" y="100" width="800" height="824" rx="80" fill="#F4EFE6" mask="url(#t-cutout)"/>

  <!-- Hot Mic dot — solid, not cut out -->
  <circle cx="790" cy="248" r="40" fill="#E68A3C"/>

  <!-- Subtle inner edge on the cutout (depth cue) -->
  <g fill="none" stroke="#0E0D0A" stroke-width="1" opacity="0.15">
    <polygon points="168,318 856,300 856,365 168,383"/>
    <rect x="462" y="365" width="100" height="390" rx="3"/>
  </g>
</svg>
