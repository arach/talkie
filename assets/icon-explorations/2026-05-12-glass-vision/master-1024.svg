<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Frosted glass fill -->
    <linearGradient id="glass-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4EFE6" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#F4EFE6" stop-opacity="0.15"/>
    </linearGradient>
    <!-- Top highlight -->
    <linearGradient id="glass-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.5"/>
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <!-- Inner shadow filter -->
    <filter id="inner-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feOffset dx="0" dy="4" result="offset"/>
      <feComposite in="offset" in2="SourceAlpha" operator="arithmetic" k2="-1" k3="1" result="shadow"/>
      <feFlood flood-color="#0E0D0A" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="shadow" operator="in" result="inner"/>
      <feComposite in="SourceGraphic" in2="inner" operator="over"/>
    </filter>
    <!-- Backdrop blur (simulated) -->
    <filter id="bg-blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background: warm neutral -->
  <rect width="1024" height="1024" fill="#2A2520"/>

  <!-- Subtle warm gradient behind -->
  <ellipse cx="512" cy="500" rx="400" ry="350" fill="#3D342A" filter="url(#bg-blur)"/>

  <!-- Landmark T mark — frosted glass -->
  <g filter="url(#inner-shadow)">
    <!-- Crossbar -->
    <polygon points="168,318 856,300 856,365 168,383" fill="url(#glass-fill)"/>
    <!-- Stem -->
    <rect x="462" y="365" width="100" height="390" rx="3" fill="url(#glass-fill)"/>
    <!-- Hook -->
    <path d="M 462 720 L 462 765 Q 462 800 435 812 Q 410 822 405 800 Q 400 778 425 772 L 462 765" fill="url(#glass-fill)"/>
  </g>

  <!-- Top highlight stroke -->
  <polygon points="168,318 856,300 856,308 168,326" fill="url(#glass-highlight)"/>

  <!-- Subtle border -->
  <g fill="none" stroke="#F4EFE6" stroke-opacity="0.12" stroke-width="1.5">
    <polygon points="168,318 856,300 856,365 168,383"/>
    <rect x="462" y="365" width="100" height="390" rx="3"/>
  </g>

  <!-- Hot Mic dot — glowing -->
  <circle cx="790" cy="248" r="36" fill="#E68A3C" opacity="0.9"/>
  <circle cx="790" cy="248" r="50" fill="#E68A3C" opacity="0.15"/>
</svg>
