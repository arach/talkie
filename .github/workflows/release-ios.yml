name: Release iOS App Store

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version, for example 2.5.26'
        required: true
        type: string
      build:
        description: 'Build number, defaults to BUILD_NUMBER from the repo'
        required: false
        type: string
      upload_binary:
        description: 'Build and upload the IPA; disable to only prepare App Store Connect metadata'
        required: false
        default: true
        type: boolean
      upload_screenshots:
        description: 'Replace the English App Store screenshots with the checked-in marketing set'
        required: false
        default: false
        type: boolean
      upload_app_preview:
        description: 'Replace the English 6.9-inch iPhone App Preview'
        required: false
        default: false
        type: boolean
      wait_for_processing:
        description: 'Wait for App Store Connect processing to complete'
        required: false
        default: false
        type: boolean

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TALKIE_TEAM_ID: ${{ vars.TALKIE_TEAM_ID }}
  TALKIE_APP_IDENTIFIER: ${{ vars.TALKIE_APP_IDENTIFIER }}

jobs:
  upload:
    name: Build and upload to App Store Connect
    runs-on: macos-26
    environment: release
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail

          if [ -d /Applications/Xcode_26.4.0.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.0.app
          else
            sudo xcode-select -s /Applications/Xcode.app
          fi

          xcodebuild -version

      - name: Resolve version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="${{ inputs.version }}"
          build_number="${{ inputs.build }}"
          if [ -z "$build_number" ]; then
            build_number="$(tr -d '[:space:]' < BUILD_NUMBER)"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: $version" >&2
            exit 1
          fi
          if [[ ! "$build_number" =~ ^[0-9]+$ ]]; then
            echo "Invalid build number: $build_number" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build_number=$build_number" >> "$GITHUB_OUTPUT"
          echo "VERSION=$version" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$build_number" >> "$GITHUB_ENV"

      - name: Validate release configuration
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ vars.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ vars.APP_STORE_CONNECT_ISSUER_ID }}
        shell: bash
        run: |
          set -euo pipefail

          missing=()
          for name in \
            TALKIE_TEAM_ID \
            TALKIE_APP_IDENTIFIER \
            APP_STORE_CONNECT_API_KEY_P8 \
            APP_STORE_CONNECT_KEY_ID \
            APP_STORE_CONNECT_ISSUER_ID; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing release secret or variable: %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Configure App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
          APP_STORE_CONNECT_KEY_ID: ${{ vars.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ vars.APP_STORE_CONNECT_ISSUER_ID }}
        shell: bash
        run: |
          set -euo pipefail

          key_path="$RUNNER_TEMP/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" > "$key_path"
          chmod 600 "$key_path"

          echo "APP_STORE_CONNECT_API_KEY_PATH=$key_path" >> "$GITHUB_ENV"
          echo "APP_STORE_CONNECT_KEY_ID=$APP_STORE_CONNECT_KEY_ID" >> "$GITHUB_ENV"
          echo "APP_STORE_CONNECT_ISSUER_ID=$APP_STORE_CONNECT_ISSUER_ID" >> "$GITHUB_ENV"

      - name: Prepare App Store version
        shell: bash
        run: |
          set -euo pipefail

          ruby scripts/asc-prepare-ios-version.rb \
            --bundle-id "$TALKIE_APP_IDENTIFIER" \
            --version "$VERSION" \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key-path "$APP_STORE_CONNECT_API_KEY_PATH"

      - name: Set up Ruby for marketing upload
        if: ${{ inputs.upload_screenshots || inputs.upload_app_preview }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Upload App Store screenshots
        if: ${{ inputs.upload_screenshots }}
        shell: bash
        run: |
          set -euo pipefail

          gem install fastlane --version 2.237.0 --no-document
          ruby -e '
            spec = Gem::Specification.find_by_name("fastlane", "2.237.0")
            path = File.join(spec.full_gem_path, "spaceship/lib/spaceship/connect_api/models/app.rb")
            source = File.read(path)
            needle = "Spaceship::ConnectAPI::AppStoreVersion::AppVersionState::PREPARE_FOR_SUBMISSION,\n            Spaceship::ConnectAPI::AppStoreVersion::AppVersionState::DEVELOPER_REJECTED,"
            replacement = "Spaceship::ConnectAPI::AppStoreVersion::AppVersionState::PREPARE_FOR_SUBMISSION,\n            Spaceship::ConnectAPI::AppStoreVersion::AppVersionState::READY_FOR_REVIEW,\n            Spaceship::ConnectAPI::AppStoreVersion::AppVersionState::DEVELOPER_REJECTED,"
            patched = source.sub(needle, replacement)
            abort "Fastlane editable-version patch did not apply" if patched == source
            File.write(path, patched)
          '

          api_key_json="$RUNNER_TEMP/fastlane-api-key.json"
          export FASTLANE_API_KEY_JSON="$api_key_json"
          ruby -rbase64 -rjson -e '
            payload = {
              key_id: ENV.fetch("APP_STORE_CONNECT_KEY_ID"),
              issuer_id: ENV.fetch("APP_STORE_CONNECT_ISSUER_ID"),
              key: Base64.strict_encode64(File.binread(ENV.fetch("APP_STORE_CONNECT_API_KEY_PATH"))),
              is_key_content_base64: true,
              in_house: false
            }
            File.write(ENV.fetch("FASTLANE_API_KEY_JSON"), JSON.generate(payload))
          '
          chmod 600 "$api_key_json"
          ruby -rjson -e '
            payload = JSON.parse(File.read(ENV.fetch("FASTLANE_API_KEY_JSON")))
            abort "Invalid Fastlane API key JSON" unless payload.values_at("key_id", "issuer_id", "key").all? { |value| !value.to_s.empty? }
          '

          apps/ios/fastlane/marketing/prepare-upload.sh
          (
            cd apps/ios
            unset APP_STORE_CONNECT_API_KEY_PATH
            TALKIE_APP_STORE_VERSION="$VERSION" \
              TALKIE_FASTLANE_API_KEY_PATH="$api_key_json" \
              fastlane deliver
          )

      - name: Upload App Preview
        if: ${{ inputs.upload_app_preview }}
        shell: bash
        run: |
          set -euo pipefail

          gem install fastlane --version 2.237.0 --no-document
          preview_args=(
            --bundle-id "$TALKIE_APP_IDENTIFIER"
            --version "$VERSION"
            --path apps/ios/fastlane/marketing/app-preview/output/Talkie-App-Preview-6.9-inch.mp4
            --key-id "$APP_STORE_CONNECT_KEY_ID"
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID"
            --private-key-path "$APP_STORE_CONNECT_API_KEY_PATH"
          )
          if [ "${{ inputs.wait_for_processing }}" = "true" ]; then
            preview_args+=(--wait-for-processing)
          fi

          ruby scripts/asc-upload-app-preview.rb "${preview_args[@]}"

      - name: Sync version metadata
        if: ${{ inputs.upload_binary }}
        shell: bash
        run: ./scripts/sync-version.sh "$VERSION" --build "$BUILD_NUMBER"

      - name: Archive iOS app
        if: ${{ inputs.upload_binary }}
        shell: bash
        run: |
          set -euo pipefail

          archive_path="$RUNNER_TEMP/Talkie-iOS.xcarchive"
          derived_data_path="$RUNNER_TEMP/Talkie-iOS-DerivedData"
          rm -rf "$archive_path" "$derived_data_path"

          xcodebuild -project apps/ios/Talkie-iOS.xcodeproj \
            -scheme Talkie \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$archive_path" \
            -derivedDataPath "$derived_data_path" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APP_STORE_CONNECT_API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID" \
            DEVELOPMENT_TEAM="$TALKIE_TEAM_ID" \
            TALKIE_DEVELOPMENT_TEAM="$TALKIE_TEAM_ID" \
            TALKIE_CODE_SIGNING_ALLOWED=YES \
            TALKIE_CODE_SIGNING_REQUIRED=YES \
            TALKIE_APP_IDENTIFIER="$TALKIE_APP_IDENTIFIER" \
            TALKIE_IOS_APP_BUNDLE_ID="$TALKIE_APP_IDENTIFIER" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="$BUILD_NUMBER" \
            archive

          echo "TALKIE_IOS_ARCHIVE_PATH=$archive_path" >> "$GITHUB_ENV"

      - name: Export App Store IPA
        if: ${{ inputs.upload_binary }}
        shell: bash
        run: |
          set -euo pipefail

          export_path="$RUNNER_TEMP/Talkie-iOS-export"
          export_options="$RUNNER_TEMP/ExportOptions-AppStore.plist"
          rm -rf "$export_path"

          cat > "$export_options" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>export</string>
            <key>iCloudContainerEnvironment</key>
            <string>Production</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>teamID</key>
            <string>${TALKIE_TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$TALKIE_IOS_ARCHIVE_PATH" \
            -exportPath "$export_path" \
            -exportOptionsPlist "$export_options" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$APP_STORE_CONNECT_API_KEY_PATH" \
            -authenticationKeyID "$APP_STORE_CONNECT_KEY_ID" \
            -authenticationKeyIssuerID "$APP_STORE_CONNECT_ISSUER_ID"

          ipa_path="$(find "$export_path" -maxdepth 1 -name '*.ipa' -print -quit)"
          if [ -z "$ipa_path" ]; then
            echo "No IPA was exported" >&2
            exit 1
          fi

          echo "TALKIE_IOS_IPA_PATH=$ipa_path" >> "$GITHUB_ENV"

      - name: Upload to App Store Connect
        if: ${{ inputs.upload_binary }}
        shell: bash
        run: |
          set -euo pipefail

          upload_args=(
            --upload-app
            -f "$TALKIE_IOS_IPA_PATH"
            --api-key "$APP_STORE_CONNECT_KEY_ID"
            --api-issuer "$APP_STORE_CONNECT_ISSUER_ID"
            --p8-file-path "$APP_STORE_CONNECT_API_KEY_PATH"
          )

          if [ "${{ inputs.wait_for_processing }}" = "true" ]; then
            upload_args+=(--wait)
          fi

          xcrun altool "${upload_args[@]}"

      - name: Attach build to App Store version
        if: ${{ inputs.upload_binary && inputs.wait_for_processing }}
        shell: bash
        run: |
          set -euo pipefail

          ruby scripts/asc-prepare-ios-version.rb \
            --bundle-id "$TALKIE_APP_IDENTIFIER" \
            --version "$VERSION" \
            --build "$BUILD_NUMBER" \
            --attach-build \
            --build-timeout 1800 \
            --key-id "$APP_STORE_CONNECT_KEY_ID" \
            --issuer-id "$APP_STORE_CONNECT_ISSUER_ID" \
            --private-key-path "$APP_STORE_CONNECT_API_KEY_PATH"

      - name: Upload IPA artifact
        if: ${{ inputs.upload_binary }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: Talkie-iOS-${{ steps.version.outputs.version }}-${{ steps.version.outputs.build_number }}-ipa
          path: ${{ env.TALKIE_IOS_IPA_PATH }}
          if-no-files-found: error
