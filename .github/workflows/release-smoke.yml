name: Release Smoke Test

on:
  push:
    tags:
      - 'smoke-v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Smoke release version, for example 0.0.0-public.1'
        required: true
        default: 0.0.0-public.1
        type: string
      create_release:
        description: 'Create or update a draft prerelease'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  smoke:
    name: Create draft smoke release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Resolve smoke version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE:-}" == "tag" ]]; then
            version="${GITHUB_REF_NAME#smoke-v}"
          else
            version="${{ inputs.version }}"
          fi

          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid smoke version: $version" >&2
            exit 1
          fi

          tag="smoke-v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build source archive
        id: archive
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag }}"
          archive="$RUNNER_TEMP/talkie-$tag-source.tar.gz"
          checksum="$archive.sha256"

          git archive \
            --format=tar.gz \
            --prefix="talkie-$tag/" \
            -o "$archive" \
            HEAD

          shasum -a 256 "$archive" > "$checksum"

          echo "archive=$archive" >> "$GITHUB_OUTPUT"
          echo "checksum=$checksum" >> "$GITHUB_OUTPUT"

      - name: Ensure smoke tag exists
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag }}"

          if git ls-remote --exit-code origin "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "$tag" "$GITHUB_SHA"
          git push origin "refs/tags/$tag"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: talkie-${{ steps.version.outputs.tag }}-source
          path: |
            ${{ steps.archive.outputs.archive }}
            ${{ steps.archive.outputs.checksum }}
          if-no-files-found: error

      - name: Create or update draft prerelease
        if: ${{ github.event_name == 'push' || inputs.create_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          tag="${{ steps.version.outputs.tag }}"
          version="${{ steps.version.outputs.version }}"
          archive="${{ steps.archive.outputs.archive }}"
          checksum="${{ steps.archive.outputs.checksum }}"
          notes="$RUNNER_TEMP/release-notes.md"

          cat > "$notes" <<EOF
          Smoke release $version

          This draft prerelease verifies the public repository release path. It is not a product release.
          EOF

          if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$tag" "$archive" "$checksum" \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
            gh release edit "$tag" \
              --repo "$GITHUB_REPOSITORY" \
              --title "Talkie smoke $version" \
              --notes-file "$notes" \
              --prerelease
          else
            gh release create "$tag" "$archive" "$checksum" \
              --repo "$GITHUB_REPOSITORY" \
              --target "$GITHUB_SHA" \
              --title "Talkie smoke $version" \
              --notes-file "$notes" \
              --draft \
              --prerelease
          fi
