name: Release Candidate

on:
  push:
    tags:
      - 'candidate-v*'
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  npm:
    name: Package npm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/npm/cli
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Package dry run
        run: npm publish --dry-run --access public

  macos:
    name: Build macOS apps
    runs-on: macos-26
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail

          if [ -d /Applications/Xcode_26.4.0.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.0.app
          else
            sudo xcode-select -s /Applications/Xcode.app
          fi

          xcodebuild -version

      - name: Build macOS app targets
        run: scripts/ci/build-apple-smoke.sh macos

  ios:
    name: Build iOS/watchOS simulator apps
    runs-on: macos-26
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Select Xcode
        shell: bash
        run: |
          set -euo pipefail

          if [ -d /Applications/Xcode_26.4.0.app ]; then
            sudo xcode-select -s /Applications/Xcode_26.4.0.app
          else
            sudo xcode-select -s /Applications/Xcode.app
          fi

          xcodebuild -version

      - name: Build iOS and watchOS simulator targets
        run: scripts/ci/build-apple-smoke.sh ios
