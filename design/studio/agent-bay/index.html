<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Agent Bay · Scheme Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --canvas: #FBFBFA;
  --canvas-alt: #F2F2F1;
  --page-ink: #2A2620;
  --page-ink-faint: #7A746C;
  --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  --serif: "Cormorant Garamond", "Iowan Old Style", "Palatino", serif;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  background: var(--canvas);
  color: var(--page-ink);
  font-family: var(--mono);
  -webkit-font-smoothing: antialiased;
}

/* ============================================================ */
/* Page chrome                                                  */
/* ============================================================ */

.page {
  max-width: 1680px;
  margin: 0 auto;
  padding: 24px 28px 64px;
}

.page-header {
  display: flex;
  align-items: baseline;
  gap: 16px;
  padding: 6px 0 18px;
  border-bottom: 0.5px solid #E0DCD3;
  margin-bottom: 22px;
}

.page-title {
  font-family: var(--serif);
  font-size: 28px;
  font-weight: 500;
  margin: 0;
  letter-spacing: -0.01em;
}

.page-eyebrow {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.22em;
  color: var(--page-ink-faint);
  text-transform: uppercase;
}

.page-help {
  margin-left: auto;
  font-size: 10px;
  color: var(--page-ink-faint);
  letter-spacing: 0.12em;
}

/* Toggles */

.toggles {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  padding: 10px 12px;
  margin-bottom: 22px;
  background: #14181A;
  border-radius: 4px;
  border: 0.5px solid rgba(232, 154, 60, 0.15);
  box-shadow: inset 2px 0 0 rgba(232, 154, 60, 0.6);
}

.toggle-group-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.18em;
  color: #7A8B85;
  align-self: center;
  text-transform: uppercase;
  margin-right: 4px;
}

.chip {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  padding: 4px 8px;
  border-radius: 3px;
  border: 0.5px solid rgba(232, 154, 60, 0.15);
  color: #9AA8A4;
  background: transparent;
  cursor: pointer;
  transition: background 0.12s, color 0.12s, border-color 0.12s;
}

.chip:hover {
  border-color: rgba(232, 154, 60, 0.32);
  color: #E89A3C;
}

.chip.on {
  background: #E89A3C;
  border-color: #E89A3C;
  color: #14181A;
}

.toggle-spacer { flex: 1; }

/* ============================================================ */
/* Bay grid                                                     */
/* ============================================================ */

.bay-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 22px 22px;
}

@media (min-width: 1500px) {
  .bay-grid { grid-template-columns: 1fr 1fr 1fr; }
}

.bay-card {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.bay-card-label {
  display: flex;
  align-items: baseline;
  gap: 10px;
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.22em;
  color: var(--page-ink-faint);
  text-transform: uppercase;
}

.bay-card-label .scheme-swatch {
  width: 9px;
  height: 9px;
  border-radius: 50%;
  display: inline-block;
}

.bay-card-label .scheme-name {
  color: var(--page-ink);
  letter-spacing: 0.18em;
}

.bay-card-label .scheme-bg-hex {
  font-size: 9px;
  color: var(--page-ink-faint);
}

/* ============================================================ */
/* Bay (the artifact under iteration)                           */
/* ============================================================ */

.bay {
  position: relative;
  border-radius: 8px;
  overflow: hidden;
  background: var(--bay-bg);
  border: 0.5px solid var(--bay-edge);
  box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
  height: 220px;
  font-family: var(--mono);
}

body.compact .bay { height: 158px; }

/* Layered backgrounds */

.bay-graticule {
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(to right, var(--bay-graticule) 0.5px, transparent 0.5px),
    linear-gradient(to bottom, var(--bay-graticule) 0.5px, transparent 0.5px);
  background-size: 28px 28px;
  opacity: 0.45;
  pointer-events: none;
}

/* Strips */

.bay-strip {
  position: relative;
  display: flex;
  align-items: center;
  padding: 10px 16px;
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  z-index: 2;
}

.bay-strip-top {
  background: var(--bay-strip-top);
}

.bay-strip-top::after,
.bay-strip-bottom::before {
  content: "";
  position: absolute;
  left: 16px;
  right: 16px;
  height: 0.5px;
  background: var(--bay-edge);
}

.bay-strip-top::after { bottom: 0; }
.bay-strip-bottom::before { top: 0; }

.bay-strip-bottom {
  background: var(--bay-strip-bottom);
}

.bay-strip .ink-faint { color: var(--bay-ink-faint); }
.bay-strip .ink-subtle { color: var(--bay-ink-subtle); margin-left: auto; }

.dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--bay-accent);
  margin-right: 8px;
  box-shadow: 0 0 4px var(--bay-accent-glow);
}

/* Body */

.bay-body {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: column;
  z-index: 2;
}

.bay-stats {
  flex: 1;
  display: flex;
  padding: 0 16px;
  align-items: center;
}

.stat {
  flex: 1;
  padding: 0 14px;
  border-right: 0.5px solid var(--bay-edge);
  display: flex;
  flex-direction: column;
  gap: 4px;
  justify-content: center;
  min-height: 88px;
}

body.compact .stat { min-height: 52px; }

.stat:last-child { border-right: none; }

.stat-value {
  font-family: var(--serif);
  font-size: 34px;
  line-height: 1;
  letter-spacing: -0.01em;
  color: var(--bay-ink);
  text-shadow: 0 0 4px var(--bay-accent-glow);
}

body.compact .stat-value { font-size: 26px; }

.stat-label {
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--bay-ink-faint);
}

.stat-sparkline {
  width: 100%;
  height: 12px;
  margin-top: 2px;
  display: none;
}

body.sparkline .stat-sparkline { display: block; }

.stat-sparkline path {
  fill: none;
  stroke: var(--bay-accent);
  stroke-opacity: 0.7;
  stroke-width: 1;
}

/* Bay layout: column with header / body / footer */

.bay-inner {
  display: flex;
  flex-direction: column;
  height: 100%;
  position: relative;
  z-index: 2;
}

/* Heatmap */

.bay-heatmap {
  position: absolute;
  top: 40px;
  right: 18px;
  z-index: 3;
  display: none;
  flex-direction: column;
  gap: 4px;
  pointer-events: none;
}

body.heatmap .bay-heatmap { display: flex; }

.bay-heatmap-label {
  font-size: 8px;
  font-weight: 600;
  letter-spacing: 0.10em;
  color: var(--bay-ink-faint);
  text-transform: uppercase;
}

.bay-heatmap-grid {
  display: grid;
  grid-template-columns: repeat(7, 8px);
  grid-template-rows: repeat(5, 8px);
  gap: 2px;
}

.bay-heatmap-cell {
  width: 8px;
  height: 8px;
  border-radius: 1.5px;
}

/* Timeline */

.bay-timeline {
  display: none;
  flex-direction: column;
  gap: 3px;
  padding: 0 30px 6px;
}

body.timeline .bay-timeline { display: flex; }

.bay-timeline-axis {
  display: flex;
  justify-content: space-between;
  font-size: 7px;
  font-weight: 600;
  letter-spacing: 0.10em;
  color: var(--bay-ink-subtle);
}

.bay-timeline-bars {
  display: flex;
  gap: 1px;
  height: 14px;
  align-items: flex-end;
}

.bay-timeline-bar {
  flex: 1;
  background: var(--bay-accent);
  border-radius: 0.5px;
}

/* Brackets */

.bay-brackets {
  position: absolute;
  inset: 32px 4px;
  pointer-events: none;
  display: none;
  z-index: 3;
}

body.brackets .bay-brackets { display: block; }

.bay-brackets svg {
  width: 100%;
  height: 100%;
}

.bay-brackets path {
  fill: none;
  stroke: var(--bay-edge-strong);
  stroke-width: 1;
}

/* Bezel */

.bay-bezel {
  position: absolute;
  inset: 0.5px;
  border-radius: 7.5px;
  pointer-events: none;
  display: none;
  z-index: 4;
  background:
    linear-gradient(to bottom,
      var(--bay-bezel-highlight) 0%,
      transparent 35%,
      transparent 65%,
      var(--bay-bezel-shadow) 100%
    );
  -webkit-mask: linear-gradient(black 0 0) content-box, linear-gradient(black 0 0);
  -webkit-mask-composite: xor;
          mask-composite: exclude;
  padding: 1px;
}

body.bezel .bay-bezel { display: block; }

/* ============================================================ */
/* Scheme tokens                                                */
/* ============================================================ */

/* Each scheme is one ruleset of CSS vars applied via .scheme-X
   on the .bay element. */

.scheme-amber {
  --bay-bg: #14181A;
  --bay-graticule: rgba(232, 154, 60, 0.08);
  --bay-strip-top: linear-gradient(to bottom, #1F2426 0%, #1A1F22 35%, #0F1416 100%);
  --bay-strip-bottom: linear-gradient(to bottom, #0D1113 0%, #161B1E 55%, #1E2528 100%);
  --bay-ink: #E89A3C;
  --bay-ink-faint: #7A8B85;
  --bay-ink-subtle: #6B7A75;
  --bay-accent: #E89A3C;
  --bay-accent-glow: rgba(232, 154, 60, 0.50);
  --bay-edge: rgba(232, 154, 60, 0.10);
  --bay-edge-strong: rgba(232, 154, 60, 0.28);
  --bay-bezel-highlight: rgba(255, 255, 255, 0.10);
  --bay-bezel-shadow: rgba(0, 0, 0, 0.45);
}

.scheme-carbon {
  --bay-bg: #0E0F10;
  --bay-graticule: rgba(232, 154, 60, 0.07);
  --bay-strip-top: linear-gradient(to bottom, #1A1B1C 0%, #141516 45%, #08090A 100%);
  --bay-strip-bottom: linear-gradient(to bottom, #060708 0%, #131415 55%, #1C1D1E 100%);
  --bay-ink: #F0EDE6;
  --bay-ink-faint: #B8B2A4;
  --bay-ink-subtle: #8A8478;
  --bay-accent: #FF9D33;          /* electric amber pops harder on true black */
  --bay-accent-glow: rgba(255, 157, 51, 0.40);
  --bay-edge: rgba(255, 255, 255, 0.06);
  --bay-edge-strong: rgba(255, 157, 51, 0.32);
  --bay-bezel-highlight: rgba(255, 255, 255, 0.08);
  --bay-bezel-shadow: rgba(0, 0, 0, 0.55);
}

/* SLATE — real slate stone. Cooler, slightly more saturated, with a
   golden amber accent that reads as lit signage rather than the
   too-orange standard amber that was clashing on the cool surface. */
.scheme-slate {
  --bay-bg: #363D45;
  --bay-graticule: rgba(255, 255, 255, 0.05);
  --bay-strip-top: linear-gradient(to bottom, #444B53 0%, #3C434B 45%, #2F353C 100%);
  --bay-strip-bottom: linear-gradient(to bottom, #2C3239 0%, #353B43 55%, #3E454D 100%);
  --bay-ink: #F4F2EC;               /* warm-white chalk on slate */
  --bay-ink-faint: #BFC6CE;
  --bay-ink-subtle: #8A9098;
  --bay-accent: #E5B040;            /* golden amber — sings on cool dark */
  --bay-accent-glow: rgba(229, 176, 64, 0.38);
  --bay-edge: rgba(255, 255, 255, 0.10);
  --bay-edge-strong: rgba(229, 176, 64, 0.42);
  --bay-bezel-highlight: rgba(255, 255, 255, 0.14);
  --bay-bezel-shadow: rgba(0, 0, 0, 0.32);
}

/* OXIDE — patinated blue-steel. Weathered industrial: deep navy-steel
   surface with brass/copper-patina accent. Warm-white ink rather than
   crisp white so it doesn't feel like generic dark-mode. */
.scheme-oxide {
  --bay-bg: #22344A;
  --bay-graticule: rgba(255, 220, 180, 0.04);
  --bay-strip-top: linear-gradient(to bottom, #2C4258 0%, #243A50 45%, #1B2D40 100%);
  --bay-strip-bottom: linear-gradient(to bottom, #182838 0%, #20324A 55%, #283E58 100%);
  --bay-ink: #ECE0CE;               /* aged paper / brass ink */
  --bay-ink-faint: #A8B4C2;
  --bay-ink-subtle: #788596;
  --bay-accent: #D69862;            /* patina copper — warm against blue-steel */
  --bay-accent-glow: rgba(214, 152, 98, 0.40);
  --bay-edge: rgba(214, 152, 98, 0.16);
  --bay-edge-strong: rgba(214, 152, 98, 0.45);
  --bay-bezel-highlight: rgba(255, 245, 220, 0.10);
  --bay-bezel-shadow: rgba(0, 0, 0, 0.40);
}

/* CONCRETE — warm industrial gray. Bridges STEEL toward BONE. Espresso
   ink on poured concrete with copper hardware. */
.scheme-concrete {
  --bay-bg: #B0ADA6;
  --bay-graticule: rgba(40, 30, 20, 0.05);
  --bay-strip-top: linear-gradient(to bottom, #BEBAB1 0%, #B5B1A8 45%, #A8A49C 100%);
  --bay-strip-bottom: linear-gradient(to bottom, #A29E96 0%, #ABA7A0 55%, #B5B1AA 100%);
  --bay-ink: #1F1A14;               /* espresso */
  --bay-ink-faint: #4A4338;
  --bay-ink-subtle: #6A6358;
  --bay-accent: #9A6A22;            /* deep copper — same family as BONE/PAPER */
  --bay-accent-glow: rgba(0, 0, 0, 0);
  --bay-edge: rgba(40, 30, 20, 0.18);
  --bay-edge-strong: rgba(154, 106, 34, 0.48);
  --bay-bezel-highlight: rgba(255, 250, 240, 0.32);
  --bay-bezel-shadow: rgba(0, 0, 0, 0.14);
}

/* STEEL — refined. Slightly cooler bg, accent shifted from the muddy
   deep-amber #B86810 (which was reading brown) to the canonical
   #E89A3C amber. Saturated copper on cool gray reads as industrial
   signage, not as faded enamel. */
.scheme-steel {
  --bay-bg: #BCC3C9;
  --bay-graticule: rgba(0, 0, 0, 0.05);
  --bay-strip-top: linear-gradient(to bottom, #CAD0D5 0%, #C2C8CE 45%, #B4BAC0 100%);
  --bay-strip-bottom: linear-gradient(to bottom, #AEB4BA 0%, #B7BDC3 55%, #C0C6CC 100%);
  --bay-ink: #14181A;               /* gunmetal ink — echoes AMBER bg */
  --bay-ink-faint: #3A4046;
  --bay-ink-subtle: #5E6469;
  --bay-accent: #E89A3C;            /* canonical amber — sharp on cool gray */
  --bay-accent-glow: rgba(0, 0, 0, 0);
  --bay-edge: rgba(20, 24, 26, 0.18);
  --bay-edge-strong: rgba(232, 154, 60, 0.55);
  --bay-bezel-highlight: rgba(255, 255, 255, 0.50);
  --bay-bezel-shadow: rgba(0, 0, 0, 0.14);
}

/* ALUMINUM — light brushed cool. Cleaner, lighter, cooler than STEEL.
   Charcoal ink (not true black) so the surface reads softer. Same
   amber accent — saturated to pop against the cooler floor. */
.scheme-aluminum {
  --bay-bg: #D6DBE0;
  --bay-graticule: rgba(0, 0, 0, 0.04);
  --bay-strip-top: linear-gradient(to bottom, #E2E6EA 0%, #DADFE4 45%, #CED3D8 100%);
  --bay-strip-bottom: linear-gradient(to bottom, #C8CDD2 0%, #D1D6DB 55%, #DADEE3 100%);
  --bay-ink: #1F242A;               /* charcoal, slightly cool */
  --bay-ink-faint: #4A5158;
  --bay-ink-subtle: #6E757C;
  --bay-accent: #D49236;            /* amber, slightly cooler tone */
  --bay-accent-glow: rgba(0, 0, 0, 0);
  --bay-edge: rgba(28, 36, 44, 0.16);
  --bay-edge-strong: rgba(212, 146, 54, 0.48);
  --bay-bezel-highlight: rgba(255, 255, 255, 0.55);
  --bay-bezel-shadow: rgba(0, 0, 0, 0.10);
}

.scheme-bone {
  --bay-bg: #E8E2D2;
  --bay-graticule: rgba(60, 40, 20, 0.05);
  --bay-strip-top: linear-gradient(to bottom, #F2EBD8 0%, #EBE4D2 45%, #E0D9C4 100%);
  --bay-strip-bottom: linear-gradient(to bottom, #DDD6C0 0%, #E5DDC8 55%, #EDE5D0 100%);
  --bay-ink: #2A1F14;
  --bay-ink-faint: #5A4E3C;
  --bay-ink-subtle: #7A6E5C;
  --bay-accent: #9A6A22;
  --bay-accent-glow: rgba(0, 0, 0, 0);
  --bay-edge: rgba(60, 40, 20, 0.16);
  --bay-edge-strong: rgba(154, 106, 34, 0.42);
  --bay-bezel-highlight: rgba(255, 255, 255, 0.45);
  --bay-bezel-shadow: rgba(0, 0, 0, 0.10);
}

.scheme-paper {
  --bay-bg: #EEE7D6;
  --bay-graticule: rgba(60, 40, 20, 0.05);
  --bay-strip-top: linear-gradient(to bottom, #F5EFE2 0%, #EDE6D4 45%, #E5DDCA 100%);
  --bay-strip-bottom: linear-gradient(to bottom, #E2DAC4 0%, #EBE3CD 55%, #F3ECD8 100%);
  --bay-ink: #2A2117;
  --bay-ink-faint: #6E5F46;
  --bay-ink-subtle: #8A7C66;
  --bay-accent: #9A6A22;
  --bay-accent-glow: rgba(0, 0, 0, 0);
  --bay-edge: rgba(60, 40, 20, 0.16);
  --bay-edge-strong: rgba(154, 106, 34, 0.42);
  --bay-bezel-highlight: rgba(255, 255, 255, 0.45);
  --bay-bezel-shadow: rgba(0, 0, 0, 0.08);
}
</style>

<div class="page">

  <div class="page-header">
    <div>
      <div class="page-eyebrow">· Agent Bay · Scheme Lab</div>
      <h1 class="page-title">Material study</h1>
    </div>
    <div class="page-help">edit schemes in index.html · live-reload in browser</div>
  </div>

  <div class="toggles">
    <span class="toggle-group-label">· Treatments</span>
    <button class="chip on" data-toggle="sparkline">Sparkline</button>
    <button class="chip on" data-toggle="compact">Compact</button>
    <button class="chip" data-toggle="heatmap">Heatmap</button>
    <button class="chip" data-toggle="timeline">Timeline</button>
    <button class="chip" data-toggle="brackets">Brackets</button>

  </div>

  <div class="bay-grid" id="bay-grid"></div>

</div>

<script>
// ============================================================
// Scheme list. Each entry renders one bay card in the grid.
// To add or tweak a scheme: edit the CSS .scheme-X block above
// AND add an entry below. Reload to see.
// ============================================================

const SCHEMES = [
  { key: "amber",    name: "AMBER",    swatch: "#E89A3C", bgHex: "#14181A" },
  { key: "carbon",   name: "CARBON",   swatch: "#FF9D33", bgHex: "#0E0F10" },
  { key: "slate",    name: "SLATE",    swatch: "#E5B040", bgHex: "#363D45" },
  { key: "oxide",    name: "OXIDE",    swatch: "#D69862", bgHex: "#22344A" },
  { key: "concrete", name: "CONCRETE", swatch: "#9A6A22", bgHex: "#B0ADA6" },
  { key: "steel",    name: "STEEL",    swatch: "#E89A3C", bgHex: "#BCC3C9" },
  { key: "aluminum", name: "ALUMINUM", swatch: "#D49236", bgHex: "#D6DBE0" },
  { key: "bone",     name: "BONE",     swatch: "#9A6A22", bgHex: "#E8E2D2" },
  { key: "paper",    name: "PAPER",    swatch: "#9A6A22", bgHex: "#EEE7D6" },
];

// Synthetic data — matches the screenshot for visual continuity.
const STATS = [
  { value: "0",    label: "Memos · Today",       seed: 0 },
  { value: "2",    label: "Dictations · Today",  seed: 1 },
  { value: "0d",   label: "Streak",              seed: 2 },
  { value: "1.5k", label: "Total Words",         seed: 3 },
];

// ------------------------------------------------------------
// Sparkline — deterministic 7-sample path. Mirrors the Swift
// version's pseudo-day shape so the HTML reads like the app.
// ------------------------------------------------------------
function sparklineSamples(seed) {
  const out = [];
  for (let i = 0; i < 7; i++) {
    const phase = seed * 0.9;
    const sine = Math.sin(i * 0.85 + phase) * 0.3 + 0.55;
    const jitter = (((seed * 31 + i * 17) & 0xFF) / 255) * 0.18;
    out.push(Math.min(0.95, Math.max(0.08, sine + jitter - 0.09)));
  }
  return out;
}

function sparklinePath(seed, w = 60, h = 12) {
  const samples = sparklineSamples(seed);
  const step = w / (samples.length - 1);
  return samples.map((v, i) => {
    const x = i * step;
    const y = h - v * h;
    return (i === 0 ? "M" : "L") + x.toFixed(1) + " " + y.toFixed(1);
  }).join(" ");
}

// ------------------------------------------------------------
// Heatmap — 7×5 cells with seeded intensities.
// ------------------------------------------------------------
function heatmapIntensity(row, col) {
  const base = ((col * 23 + row * 41 + 7) & 0xFF) / 255;
  const bias = (col / 7) * 0.4;
  const v = base * 0.7 + bias;
  return Math.min(1.0, Math.max(0.05, v));
}

// ------------------------------------------------------------
// Timeline — 48 half-hour slots with morning + evening bursts.
// ------------------------------------------------------------
function timelineIntensity(slot) {
  const hour = slot / 2;
  const morning = Math.exp(-Math.pow((hour - 10) / 3.0, 2)) * 0.75;
  const evening = Math.exp(-Math.pow((hour - 20) / 2.5, 2)) * 0.55;
  const jitter = (((slot * 53 + 11) & 0xFF) / 255) * 0.15;
  return Math.min(1.0, Math.max(0.04, morning + evening + jitter * 0.4));
}

// ------------------------------------------------------------
// Bay template — one card per scheme.
// ------------------------------------------------------------
function renderBay(scheme) {
  const sparks = STATS.map(s => `
    <svg class="stat-sparkline" viewBox="0 0 60 12" preserveAspectRatio="none">
      <path d="${sparklinePath(s.seed, 60, 12)}"/>
    </svg>
  `);

  const statsHTML = STATS.map((s, i) => `
    <div class="stat">
      <div class="stat-value">${s.value}</div>
      <div class="stat-label">${s.label}</div>
      ${sparks[i]}
    </div>
  `).join("");

  // Heatmap cells (5 rows × 7 cols).
  const heatCells = [];
  for (let r = 0; r < 5; r++) {
    for (let c = 0; c < 7; c++) {
      const intensity = heatmapIntensity(r, c);
      heatCells.push(`<div class="bay-heatmap-cell" style="background: color-mix(in srgb, var(--bay-accent) ${(10 + 60 * intensity).toFixed(0)}%, transparent);"></div>`);
    }
  }

  // Timeline bars.
  const timelineBars = [];
  for (let i = 0; i < 48; i++) {
    const intensity = timelineIntensity(i);
    const h = (intensity * 100).toFixed(0);
    const alpha = (18 + 55 * intensity).toFixed(0);
    timelineBars.push(`<div class="bay-timeline-bar" style="height: ${h}%; opacity: ${alpha}%;"></div>`);
  }

  // Brackets — four L-shapes inside an SVG that fills the inset region.
  const brackets = `
    <svg viewBox="0 0 100 100" preserveAspectRatio="none">
      <path d="M 2 12 L 2 2 L 12 2"/>
      <path d="M 88 2 L 98 2 L 98 12"/>
      <path d="M 2 88 L 2 98 L 12 98"/>
      <path d="M 88 98 L 98 98 L 98 88"/>
    </svg>
  `;

  return `
    <div class="bay-card">
      <div class="bay-card-label">
        <span class="scheme-swatch" style="background:${scheme.swatch}"></span>
        <span class="scheme-name">${scheme.name}</span>
        <span class="scheme-bg-hex">${scheme.bgHex}</span>
      </div>
      <div class="bay scheme-${scheme.key}">
        <div class="bay-graticule"></div>

        <div class="bay-inner">
          <div class="bay-strip bay-strip-top">
            <span class="dot"></span>
            <span class="ink-faint">Running · AG-01 / TALKIE.AGENT</span>
            <span class="ink-subtle">Local only · No telemetry</span>
          </div>

          <div class="bay-body">
            <div class="bay-stats">${statsHTML}</div>
            <div class="bay-timeline">
              <div class="bay-timeline-axis">
                <span>00</span><span>06</span><span>12</span><span>18</span><span>24</span>
              </div>
              <div class="bay-timeline-bars">${timelineBars.join("")}</div>
            </div>
          </div>

          <div class="bay-strip bay-strip-bottom">
            <span class="ink-faint">· Trig · Live · Signal Path · Local</span>
            <span class="ink-subtle">10:10 AM</span>
          </div>
        </div>

        <div class="bay-heatmap">
          <div class="bay-heatmap-label">Last 7d</div>
          <div class="bay-heatmap-grid">${heatCells.join("")}</div>
        </div>

        <div class="bay-brackets">${brackets}</div>
        <div class="bay-bezel"></div>
      </div>
    </div>
  `;
}

// Mount the grid.
const grid = document.getElementById("bay-grid");
grid.innerHTML = SCHEMES.map(renderBay).join("");

// ------------------------------------------------------------
// Toggle chips — toggle a class on body for each treatment.
// CSS keys off body.X to show/hide treatments.
// ------------------------------------------------------------
document.querySelectorAll("[data-toggle]").forEach(btn => {
  btn.addEventListener("click", () => {
    const key = btn.dataset.toggle;
    document.body.classList.toggle(key);
    btn.classList.toggle("on");
  });
});
</script>
</body>
</html>
