<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Talkie Capture Markup</title>
  <link rel="stylesheet" href="markup.css" />
</head>
<body>
  <div id="app">
    <header class="tool-toolbar" id="tool-toolbar">
      <!-- Canvas modes, then drawing tools. Undo/redo moved to the RIGHT,
           next to Save — they're state changes (closer to "save") rather
           than active drawing tools. -->
      <div class="toolbar-tools viewport-tools" aria-label="Canvas modes">
        <button type="button" class="tool-btn mode-tool" data-tool="select" title="Select (Option-T, S)"><span class="glyph">↖</span><span class="label">Select</span></button>
        <button type="button" class="tool-btn mode-tool" data-tool="hand" title="Hand · pan (Option-T, H)"><span class="glyph">✋</span><span class="label">Hand</span></button>
      </div>

      <span class="toolbar-divider" aria-hidden="true"></span>

      <div class="toolbar-tools drawing-tools" aria-label="Drawing tools">
        <button type="button" class="tool-btn" data-tool="rect" title="Rect (Option-T, R)"><span class="glyph">▢</span><span class="label">Rect</span></button>
        <button type="button" class="tool-btn" data-tool="arrow" title="Arrow (Option-T, A)"><span class="glyph">↗</span><span class="label">Arrow</span></button>
        <button type="button" class="tool-btn" data-tool="line" title="Line (Option-T, L)"><span class="glyph">—</span><span class="label">Line</span></button>
        <button type="button" class="tool-btn" data-tool="text" title="Text (Option-T, T)"><span class="glyph">T</span><span class="label">Text</span></button>
        <button type="button" class="tool-btn" data-tool="blur" title="Blur (Option-T, B)"><span class="glyph">▒</span><span class="label">Blur</span></button>
        <button type="button" class="tool-btn auto-blur-text" data-action="auto-blur-text" title="Blur all detected text"><span class="glyph">A▒</span><span class="label">Blur text</span></button>
        <button type="button" class="tool-btn" data-tool="clone" title="Clone a region (Option-T, C)"><span class="glyph">⧉</span><span class="label">Clone</span></button>
      </div>

      <!-- "Editing selection" affordance. Shown only while a layer is selected
           and no create-tool is armed; makes it clear the shape buttons +
           style stack are restyling the SELECTED layer, not new-draw defaults. -->
      <span class="selection-mode-badge hidden" id="selection-mode-badge" aria-hidden="true">Editing selection</span>

      <span class="toolbar-divider" aria-hidden="true"></span>

      <!-- Right: contextual style stack (per-tool defaults; selected-layer
           live-edit is a follow-up). The DOM is static so the toolbar
           height never jumps; JS hides whichever group doesn't apply to
           the current tool. -->
      <div class="style-stack" id="style-stack">
        <div class="style-group" data-group="stroke">
          <span class="style-label">width</span>
          <div class="style-row">
            <button type="button" class="style-btn stroke-pick" data-style="stroke" data-value="0.5" title="0.5 px hairline"><span class="stroke-pip" style="height: 1px"></span></button>
            <button type="button" class="style-btn stroke-pick" data-style="stroke" data-value="1" title="1 px"><span class="stroke-pip" style="height: 1px"></span></button>
            <button type="button" class="style-btn stroke-pick active" data-style="stroke" data-value="2" title="2 px"><span class="stroke-pip" style="height: 2px"></span></button>
            <button type="button" class="style-btn stroke-pick" data-style="stroke" data-value="3" title="3 px"><span class="stroke-pip" style="height: 3px"></span></button>
            <button type="button" class="style-btn stroke-pick" data-style="stroke" data-value="5" title="5 px"><span class="stroke-pip" style="height: 5px"></span></button>
          </div>
        </div>

        <span class="style-divider" aria-hidden="true"></span>

        <div class="style-group arrow-only" data-group="arrow-heads">
          <span class="style-label">heads</span>
          <div class="style-row">
            <button type="button" class="style-btn arrow-head" data-style="arrow-heads" data-value="none" title="No pointers">--</button>
            <button type="button" class="style-btn arrow-head" data-style="arrow-heads" data-value="start" title="Pointer at start">&lt;-</button>
            <button type="button" class="style-btn arrow-head active" data-style="arrow-heads" data-value="end" title="Pointer at end">-&gt;</button>
            <button type="button" class="style-btn arrow-head" data-style="arrow-heads" data-value="both" title="Pointers at both ends">&lt;&gt;</button>
          </div>
        </div>

        <span class="style-divider arrow-only" aria-hidden="true"></span>

        <div class="style-group arrow-only" data-group="pointer-style">
          <span class="style-label">tip</span>
          <div class="style-row">
            <button type="button" class="style-btn pointer-pick active" data-style="pointer-style" data-value="open" title="Open arrow">V</button>
            <button type="button" class="style-btn pointer-pick" data-style="pointer-style" data-value="filled" title="Filled arrow">F</button>
            <button type="button" class="style-btn pointer-pick" data-style="pointer-style" data-value="dot" title="Dot pointer">O</button>
            <button type="button" class="style-btn pointer-pick" data-style="pointer-style" data-value="bar" title="Bar pointer">|</button>
          </div>
        </div>

        <span class="style-divider" aria-hidden="true"></span>

        <div class="style-group" data-group="color">
          <span class="style-label">color</span>
          <div class="style-row">
            <button type="button" class="style-btn swatch" data-style="color" data-value="#232423" title="Ink" style="--c: #232423"></button>
            <button type="button" class="style-btn swatch" data-style="color" data-value="#D03A1C" title="Alert" style="--c: #D03A1C"></button>
            <button type="button" class="style-btn swatch active" data-style="color" data-value="#4F7DFF" title="Accent" style="--c: #4F7DFF"></button>
            <button type="button" class="style-btn swatch" data-style="color" data-value="#12A594" title="Teal" style="--c: #12A594"></button>
            <button type="button" class="style-btn swatch swatch-light" data-style="color" data-value="#FFFFFF" title="White" style="--c: #FFFFFF"></button>
          </div>
        </div>

        <span class="style-divider text-only" data-group="font-divider" aria-hidden="true"></span>

        <div class="style-group text-only" data-group="text-preset">
          <span class="style-label">preset</span>
          <div class="style-row">
            <button type="button" class="style-btn text-preset active" data-style="text-preset" data-value="on-light" title="For light backgrounds">L</button>
            <button type="button" class="style-btn text-preset" data-style="text-preset" data-value="on-dark" title="For dark backgrounds">D</button>
            <button type="button" class="style-btn text-preset" data-style="text-preset" data-value="accent" title="Amber accent">A</button>
            <button type="button" class="style-btn text-preset" data-style="text-preset" data-value="plain" title="Plain text">T</button>
          </div>
        </div>

        <span class="style-divider text-only" aria-hidden="true"></span>

        <div class="style-group text-only" data-group="font-size">
          <span class="style-label">size</span>
          <div class="style-row">
            <button type="button" class="style-btn font-pick" data-style="font-size" data-value="12" title="Small">S</button>
            <button type="button" class="style-btn font-pick active" data-style="font-size" data-value="16" title="Medium">M</button>
            <button type="button" class="style-btn font-pick" data-style="font-size" data-value="22" title="Large">L</button>
          </div>
        </div>

        <span class="style-divider text-only" aria-hidden="true"></span>

        <div class="style-group text-only" data-group="font-family">
          <span class="style-label">font</span>
          <div class="style-row">
            <button type="button" class="style-btn font-fam" data-style="font-family" data-value="sans" title="Sans" style="font-family: -apple-system, system-ui, sans-serif">Aa</button>
            <button type="button" class="style-btn font-fam" data-style="font-family" data-value="serif" title="Serif" style="font-family: ui-serif, Georgia, serif">Aa</button>
            <button type="button" class="style-btn font-fam active" data-style="font-family" data-value="mono" title="Mono" style="font-family: ui-monospace, monospace">Aa</button>
          </div>
        </div>

        <span class="style-divider text-only" aria-hidden="true"></span>

        <div class="style-group text-only" data-group="decoration">
          <span class="style-label">style</span>
          <div class="style-row">
            <button type="button" class="style-btn deco" data-style="bold" data-toggle title="Bold" style="font-weight: 700">B</button>
            <button type="button" class="style-btn deco" data-style="italic" data-toggle title="Italic" style="font-style: italic; font-family: ui-serif, Georgia, serif">I</button>
          </div>
        </div>

        <span class="style-divider text-only" aria-hidden="true"></span>

        <div class="style-group text-only" data-group="label-style">
          <span class="style-label">bg</span>
          <div class="style-row">
            <button type="button" class="style-btn labelbg active" data-style="plain" data-value="0" title="Pill background">▭</button>
            <button type="button" class="style-btn labelbg" data-style="plain" data-value="1" title="Plain text">T</button>
          </div>
        </div>
      </div>
      <span class="toolbar-divider" aria-hidden="true"></span>
      <!-- Undo/redo sit here (right side) with Save — state changes, grouped
           away from the active draw tools on the left. -->
      <div class="toolbar-tools history-tools" aria-label="Edit history">
        <button type="button" class="history-btn" data-action="undo" title="Undo (⌘Z)" aria-label="Undo">↶</button>
        <button type="button" class="history-btn" data-action="redo" title="Redo (⇧⌘Z)" aria-label="Redo">↷</button>
      </div>
      <button type="button" class="top-save-btn" data-action="save" title="Save markup (⌘S)">Save</button>
    </header>

    <main class="bay-body">
      <aside class="layer-rail layer-rail-left" id="layer-rail">
        <div class="layer-rail-head">
          <span class="layer-rail-title">· LAYERS</span>
          <span class="layer-rail-count" id="layer-count">0</span>
        </div>
        <div id="layer-list"></div>
      </aside>
      <div class="rail-resizer" data-resize="layers" title="Drag to resize"></div>
      <section class="canvas-wrap">
        <canvas id="canvas"></canvas>

        <!-- Floating canvas zoom cluster (Hudson pattern). Lives over the
             canvas and only owns viewport zoom controls. Global edit history
             lives in the top toolbar. -->
        <div class="canvas-zoom-cluster" id="canvas-zoom-cluster">
          <button type="button" class="zoom-btn" data-action="zoom-out" title="Zoom out">−</button>
          <span class="zoom-badge" id="zoom-display">100%</span>
          <button type="button" class="zoom-btn" data-action="zoom-in" title="Zoom in">+</button>
          <span class="zoom-divider" aria-hidden="true"></span>
          <button type="button" class="zoom-btn zoom-btn-label" data-action="zoom-fit" title="Fit">FIT</button>
        </div>
      </section>
      <div class="rail-resizer" data-resize="inspector" title="Drag to resize"></div>
      <aside class="inspector-rail" id="inspector-rail">
        <!-- Work Thread — the streamed run log. Lives in the right rail
             alongside the inspector; the rail is contextual (thread while/
             after a run, inspector on selection). Driven entirely by Swift
             via window.talkieMarkup.thread(); hidden until the first run. -->
        <div id="work-thread" class="work-thread hidden">
          <div class="wt-head">
            <span class="wt-title">· WORK THREAD</span>
            <span class="wt-status">
              <span class="wt-dot"></span>
              <span class="wt-state">live</span>
            </span>
          </div>
          <div id="wt-body" class="wt-body"></div>
          <div id="wt-foot" class="wt-foot"></div>
        </div>
        <div class="inspector-rail-head">
          <span class="inspector-rail-title">· INSPECTOR</span>
        </div>
        <div id="inspector-body" class="inspector-empty">
          Select a layer to inspect.
        </div>
      </aside>
    </main>
    <div id="popover" class="popover hidden">
      <button type="button" data-action="attach">Add to next message</button>
      <button type="button" data-action="edit-text" hidden>Edit text</button>
      <button type="button" data-action="delete">Delete layer</button>
      <button type="button" data-action="toggle">Hide / Show</button>
    </div>
  </div>
  <script src="markup.js"></script>
</body>
</html>
