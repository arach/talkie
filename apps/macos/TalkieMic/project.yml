name: TalkieMic
options:
  bundleIdPrefix: com.example
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

configs:
  Debug: debug
  Staging: release
  Release: release

configFiles:
  Debug: ../../../Config/Signing.xcconfig
  Staging: ../../../Config/Signing.xcconfig
  Release: ../../../Config/Signing.xcconfig

schemes:
  TalkieMic:
    build:
      targets:
        TalkieMic: all
    run:
      config: Debug
    archive:
      config: Release
  TalkieMic-Staging:
    build:
      targets:
        TalkieMic: all
    run:
      config: Staging
    archive:
      config: Staging

settings:
  base:
    DEVELOPMENT_TEAM: $(TALKIE_DEVELOPMENT_TEAM)
    CODE_SIGN_STYLE: Automatic
  configs:
    Debug:
      PRODUCT_BUNDLE_IDENTIFIER: $(TALKIE_MAC_MIC_BUNDLE_ID_DEBUG)
    Staging:
      PRODUCT_BUNDLE_IDENTIFIER: $(TALKIE_MAC_MIC_BUNDLE_ID_STAGING)
    Release:
      PRODUCT_BUNDLE_IDENTIFIER: $(TALKIE_MAC_MIC_BUNDLE_ID)

packages:
  TalkieKit:
    path: ../TalkieKit

targets:
  TalkieMic:
    type: application
    platform: macOS
    sources:
      - path: TalkieMic
    settings:
      base:
        INFOPLIST_FILE: TalkieMic/Info.plist
        CODE_SIGN_ENTITLEMENTS: TalkieMic/TalkieMic.entitlements
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.9"
        PRODUCT_NAME: TalkieMic
        ENABLE_HARDENED_RUNTIME: YES
    dependencies:
      - package: TalkieKit
