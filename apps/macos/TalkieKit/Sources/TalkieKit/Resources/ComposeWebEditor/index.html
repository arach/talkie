<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <style>
    html, body, #editor {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
    }

    body {
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    #talkie-editor-fingerprint {
      position: fixed;
      right: 8px;
      bottom: 7px;
      z-index: 3;
      pointer-events: none;
      user-select: none;
      opacity: 0;
      padding: 1px 4px;
      border: 0.5px solid rgba(154, 106, 34, 0.28);
      border-radius: 999px;
      background: rgba(248, 248, 247, 0.58);
      color: rgba(154, 106, 34, 0.70);
      font: 650 9px/1.35 ui-monospace, "SF Mono", Menlo, monospace;
      letter-spacing: 0.08em;
      text-transform: lowercase;
      transition: opacity 120ms ease;
    }

    body.talkie-editor-ready #talkie-editor-fingerprint {
      opacity: 0.52;
    }

    @media (prefers-color-scheme: dark) {
      #talkie-editor-fingerprint {
        border-color: rgba(230, 186, 112, 0.30);
        background: rgba(16, 16, 15, 0.38);
        color: rgba(230, 186, 112, 0.72);
      }
    }
  </style>
</head>
<body>
  <div id="editor" role="textbox" aria-multiline="true"></div>
  <div id="talkie-editor-fingerprint" aria-hidden="true">⌁ cm6</div>
  <script src="editor.js"></script>
</body>
</html>
